<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>本日のメンバー</title>
<style>
  :root {
    color-scheme: dark;
    --accent: #ff3b7f;
    --accent-2: #4fd8ff;
    --text: #f5f5f7;
    --sub: #c7c7d1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    min-height: 100%;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    background:
      linear-gradient(180deg, rgba(4,4,10,0.72) 0%, rgba(4,4,10,0.4) 30%, rgba(4,4,10,0.55) 65%, rgba(2,2,6,0.9) 100%),
      url('assets/bg.jpg') center 40% / cover no-repeat;
    min-height: 100vh;
  }
  main {
    width: 100%;
    max-width: 480px;
    padding: 56px 20px 40px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .badge {
    align-self: center;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--sub);
    margin-bottom: 18px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px 2px var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  h1 {
    text-align: center;
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    margin: 0 0 8px;
    text-shadow: 0 0 24px rgba(255,59,127,0.45), 0 2px 12px rgba(0,0,0,0.6);
  }
  p.sub {
    text-align: center;
    color: var(--sub);
    font-size: 0.88rem;
    margin: 0 0 40px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
  ul {
    list-style: none;
    margin: 0 0 auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  a.member {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(22,22,30,0.55);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--text);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  a.member:active {
    background: rgba(255,59,127,0.14);
    border-color: rgba(255,59,127,0.5);
    transform: scale(0.97);
  }
  .icon {
    font-size: 1.7rem;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    flex-shrink: 0;
  }
  .info { flex: 1; min-width: 0; }
  .instrument {
    font-size: 0.7rem;
    color: var(--accent-2);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .handle {
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chev {
    color: var(--sub);
    font-size: 1.2rem;
    opacity: 0.7;
  }
  footer {
    text-align: center;
    margin-top: 44px;
    color: rgba(255,255,255,0.55);
    font-size: 0.72rem;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
<main>
  <div class="badge"><span class="dot"></span>LIVE NOW</div>
  <h1>本日の演奏メンバー</h1>
  <p class="sub">タップしてInstagramをチェック</p>
  <ul id="member-list"></ul>
  <footer>Tap a card to open Instagram</footer>
</main>

<script>
  // 集計用ネームスペース（推測されにくいランダム値）
  const NAMESPACE = "roji-live-7bab4fe7";

  const members = [
    { instrument: "Guitar", emoji: "🎸", counter: "guitar1", url: "https://www.instagram.com/uruseiya696?igsh=MWt5bTY5OWx0bDBlcQ==" },
    { instrument: "Guitar", emoji: "🎸", counter: "guitar2", url: "https://www.instagram.com/kei_0727_nerv_?igsh=ZWY0cmNkc2M0dTI2" },
    { instrument: "Bass",   emoji: "🎻", counter: "bass",    url: "https://www.instagram.com/shinonome_la_end?igsh=MW1nY3NvdmxndTJkdQ==" },
    { instrument: "Drums",  emoji: "🥁", counter: "drums",   url: "https://www.instagram.com/2291ara?igsh=MWtxMHhmazQ4Z296dA%3D%3D&utm_source=qr" }
  ];

  function handleFromUrl(url) {
    try {
      const path = new URL(url).pathname;
      return "@" + path.split("/").filter(Boolean)[0];
    } catch (e) {
      return "";
    }
  }

  const list = document.getElementById("member-list");
  members.forEach((m) => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.className = "member";
    a.href = m.url;
    a.rel = "noopener";

    a.innerHTML = `
      <div class="icon">${m.emoji}</div>
      <div class="info">
        <div class="instrument">${m.instrument}</div>
        <div class="handle">${handleFromUrl(m.url)}</div>
      </div>
      <div class="chev">›</div>
    `;

    a.addEventListener("click", () => {
      const beacon = `https://api.counterapi.dev/v1/${NAMESPACE}/${m.counter}/up`;
      fetch(beacon, { mode: "no-cors", keepalive: true }).catch(() => {});
    });

    li.appendChild(a);
    list.appendChild(li);
  });
</script>
</body>
</html>
