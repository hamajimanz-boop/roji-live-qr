<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>出演メンバー</title>
<style>
  :root {
    color-scheme: dark;
    --accent: #d9a441;
    --text: #f2efe9;
    --sub: #a8a49c;
    --line: rgba(242,239,233,0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    min-height: 100%;
    color: var(--text);
    font-family: "Hiragino Mincho ProN", "Hiragino Sans", -apple-system, serif;
  }
  body {
    display: flex;
    justify-content: center;
    background:
      linear-gradient(180deg, rgba(3,3,6,0.82) 0%, rgba(3,3,6,0.35) 32%, rgba(3,3,6,0.55) 68%, rgba(3,3,6,0.94) 100%),
      url('assets/bg.jpg') center 40% / cover no-repeat;
    min-height: 100vh;
  }
  main {
    width: 100%;
    max-width: 460px;
    padding: 64px 26px 40px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .eyebrow {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.32em;
    color: var(--sub);
    margin: 0 0 14px;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.06em;
    margin: 0 0 56px;
    border-left: 2px solid var(--accent);
    padding-left: 16px;
  }
  ul {
    list-style: none;
    margin: 0 0 auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.member {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: rgba(10,10,14,0.62);
    border: 1px solid rgba(242,239,233,0.14);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  a.member:active {
    background: rgba(10,10,14,0.8);
    border-color: rgba(217,164,65,0.5);
  }
  a.member:active .num { color: var(--accent); }
  .num {
    font-size: 0.85rem;
    color: var(--sub);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    width: 22px;
    transition: color 0.15s ease;
  }
  .info { flex: 1; min-width: 0; }
  .instrument {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    font-size: 0.64rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .handle {
    font-size: 1.15rem;
    font-weight: 600;
    margin-top: 5px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.15s ease;
  }
  .arrow {
    font-family: -apple-system, sans-serif;
    color: var(--sub);
    font-size: 0.9rem;
    align-self: center;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">TONIGHT'S LINEUP</p>
  <h1>出演</h1>
  <ul id="member-list"></ul>
</main>

<script>
  // 集計用ネームスペース（推測されにくいランダム値）
  const NAMESPACE = "roji-live-7bab4fe7";

  const members = [
    { instrument: "Guitar", counter: "guitar1", url: "https://www.instagram.com/uruseiya696?igsh=MWt5bTY5OWx0bDBlcQ==" },
    { instrument: "Guitar", counter: "guitar2", url: "https://www.instagram.com/kei_0727_nerv_?igsh=ZWY0cmNkc2M0dTI2" },
    { instrument: "Bass",   counter: "bass",    url: "https://www.instagram.com/shinonome_la_end?igsh=MW1nY3NvdmxndTJkdQ==" },
    { instrument: "Drums",  counter: "drums",   url: "https://www.instagram.com/2291ara?igsh=MWtxMHhmazQ4Z296dA%3D%3D&utm_source=qr" }
  ];

  function handleFromUrl(url) {
    try {
      const path = new URL(url).pathname;
      return "@" + path.split("/").filter(Boolean)[0];
    } catch (e) {
      return "";
    }
  }

  const list = document.getElementById("member-list");
  members.forEach((m, i) => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.className = "member";
    a.href = m.url;
    a.rel = "noopener";

    a.innerHTML = `
      <div class="num">${String(i + 1).padStart(2, "0")}</div>
      <div class="info">
        <div class="instrument">${m.instrument}</div>
        <div class="handle">${handleFromUrl(m.url)}</div>
      </div>
      <div class="arrow">→</div>
    `;

    a.addEventListener("click", () => {
      const beacon = `https://api.counterapi.dev/v1/${NAMESPACE}/${m.counter}/up`;
      fetch(beacon, { mode: "no-cors", keepalive: true }).catch(() => {});
    });

    li.appendChild(a);
    list.appendChild(li);
  });
</script>
</body>
</html>
