<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>出演メンバー</title>
<style>
  :root {
    color-scheme: dark;
    --accent: #d9a441;
    --text: #f2efe9;
    --sub: #a8a49c;
    --line: rgba(242,239,233,0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    min-height: 100%;
    color: var(--text);
    font-family: "Hiragino Mincho ProN", "Hiragino Sans", -apple-system, serif;
  }
  body {
    display: flex;
    justify-content: center;
    background:
      linear-gradient(180deg, rgba(3,3,6,0.82) 0%, rgba(3,3,6,0.35) 32%, rgba(3,3,6,0.55) 68%, rgba(3,3,6,0.94) 100%),
      url('assets/bg.jpg') center 40% / cover no-repeat;
    min-height: 100vh;
  }
  main {
    width: 100%;
    max-width: 460px;
    padding: 64px 26px 40px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .eyebrow {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.32em;
    color: var(--sub);
    margin: 0 0 14px;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.06em;
    margin: 0 0 56px;
    border-left: 2px solid var(--accent);
    padding-left: 16px;
  }
  ul {
    list-style: none;
    margin: 0 0 auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.member {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: rgba(10,10,14,0.62);
    border: 1px solid rgba(242,239,233,0.14);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  a.member:active {
    background: rgba(10,10,14,0.8);
    border-color: rgba(217,164,65,0.5);
  }
  a.member:active .ig-icon { transform: scale(0.92); }
  .ig-icon {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    transition: transform 0.15s ease;
  }
  .info { flex: 1; min-width: 0; }
  .instrument {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    font-size: 0.64rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .handle {
    font-size: 1.15rem;
    font-weight: 600;
    margin-top: 5px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.15s ease;
  }
  .arrow {
    font-family: -apple-system, sans-serif;
    color: var(--sub);
    font-size: 0.9rem;
    align-self: center;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">TONIGHT'S LINEUP</p>
  <h1>出演</h1>
  <ul id="member-list"></ul>
</main>

<script>
  // 集計用ネームスペース（推測されにくいランダム値）
  const NAMESPACE = "roji-live-7bab4fe7";

  const members = [
    { instrument: "Guitar", counter: "guitar1", url: "https://www.instagram.com/uruseiya696?igsh=MWt5bTY5OWx0bDBlcQ==" },
    { instrument: "Guitar", counter: "guitar2", url: "https://www.instagram.com/kei_0727_nerv_?igsh=ZWY0cmNkc2M0dTI2" },
    { instrument: "Bass",   counter: "bass",    url: "https://www.instagram.com/shinonome_la_end?igsh=MW1nY3NvdmxndTJkdQ==" },
    { instrument: "Drums",  counter: "drums",   url: "https://www.instagram.com/2291ara?igsh=MWtxMHhmazQ4Z296dA%3D%3D&utm_source=qr" }
  ];

  function handleFromUrl(url) {
    try {
      const path = new URL(url).pathname;
      return "@" + path.split("/").filter(Boolean)[0];
    } catch (e) {
      return "";
    }
  }

  const list = document.getElementById("member-list");
  members.forEach((m, i) => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.className = "member";
    a.href = m.url;
    a.rel = "noopener";

    a.innerHTML = `
      <svg class="ig-icon" viewBox="0 0 24 24" aria-hidden="true">
        <defs>
          <linearGradient id="igGrad${i}" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stop-color="#FEDA75"/>
            <stop offset="25%" stop-color="#FA7E1E"/>
            <stop offset="50%" stop-color="#D62976"/>
            <stop offset="75%" stop-color="#962FBF"/>
            <stop offset="100%" stop-color="#4F5BD5"/>
          </linearGradient>
        </defs>
        <path fill="url(#igGrad${i})" d="M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12s.015 3.667.072 4.947c.06 1.277.261 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24s3.667-.015 4.947-.072c1.277-.06 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.636.558-2.913.06-1.28.072-1.687.072-4.947s-.015-3.667-.072-4.947c-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 2.16c3.203 0 3.585.016 4.85.071 1.17.055 1.805.249 2.227.415.562.217.96.477 1.382.896.419.42.679.819.896 1.381.164.422.36 1.057.413 2.227.057 1.266.07 1.646.07 4.85s-.015 3.585-.074 4.85c-.061 1.17-.256 1.805-.421 2.227-.224.562-.479.96-.899 1.382-.419.419-.824.679-1.38.896-.42.164-1.065.36-2.235.413-1.274.057-1.649.07-4.859.07-3.211 0-3.586-.015-4.859-.074-1.171-.061-1.816-.256-2.236-.421-.569-.224-.96-.479-1.379-.899-.421-.419-.69-.824-.9-1.38-.165-.42-.359-1.065-.42-2.235-.045-1.26-.061-1.649-.061-4.844 0-3.196.016-3.586.061-4.861.061-1.17.255-1.814.42-2.234.21-.57.479-.96.9-1.381.419-.419.81-.689 1.379-.898.42-.166 1.051-.361 2.221-.421 1.275-.045 1.65-.06 4.859-.06zm0 3.678c-3.405 0-6.162 2.76-6.162 6.162 0 3.405 2.76 6.162 6.162 6.162 3.405 0 6.162-2.76 6.162-6.162 0-3.405-2.76-6.162-6.162-6.162zM12 16c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm7.846-10.405c0 .795-.646 1.44-1.44 1.44-.795 0-1.44-.646-1.44-1.44 0-.794.646-1.439 1.44-1.439.793-.001 1.44.645 1.44 1.439z"/>
      </svg>
      <div class="info">
        <div class="instrument">${m.instrument}</div>
        <div class="handle">${handleFromUrl(m.url)}</div>
      </div>
      <div class="arrow">→</div>
    `;

    a.addEventListener("click", () => {
      const beacon = `https://api.counterapi.dev/v1/${NAMESPACE}/${m.counter}/up`;
      fetch(beacon, { mode: "no-cors", keepalive: true }).catch(() => {});
    });

    li.appendChild(a);
    list.appendChild(li);
  });
</script>
</body>
</html>
